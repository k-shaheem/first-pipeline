      - name: Check Website Availability
        env:
          # This must match the name you saved in GitHub exactly
          MY_URL: ${{ secrets.TARGET_URL }} 
        run: |
          # Now we use the $MY_URL variable
          RESPONSE=$(curl -Ls -o /dev/null -w "%{http_code}" "$MY_URL")
          
          if [ "$RESPONSE" -eq 200 ]; then
            echo "SUCCESS: The target is healthy (Status 200)"
          else
            echo "CRITICAL: The target returned status $RESPONSE"
            exit 1
          fi
