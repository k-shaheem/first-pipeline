name: Cloud Health Watchdog
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *'  # Runs every hour on the hour

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Website Availability
        run: |
          URL="https://google.com"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" $URL)
          if [ "$RESPONSE" -ne 200 ]; then
            echo "CRITICAL: $URL is down with status $RESPONSE"
            exit 1
          else
            echo "SUCCESS: $URL is healthy (Status 200)"
          fi

      - name: Log Timestamp
        run: echo "Last check performed at $(date)"
